<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PatientClaw · 项目海报</title>
<style>
/*
  物理尺寸：0.8m × 2.0m，150 DPI
  像素：4725px × 11811px
  预览尺寸：945px × 2362px（1/5 比例）

  章节高度分配（含6条分割线 × 3px = 18px）：
  ① HERO              370px
  ② 痛点·钩子          252px
  ③ 解决方案           390px
  ④ 成效数据           292px
  ⑤ 真实对话           328px
  ⑥ 系统输出物          348px
  ⑦ 社会价值 + Footer  364px
  合计                2362px
*/

@page { size: 842mm 2388mm; margin: 0; }
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ══════════════════════════════════
   设计系统 · Design Tokens
══════════════════════════════════ */
:root {
  --bg:       #0d1117;
  --bg2:      #161b22;
  --bg3:      #21262d;
  --border:   #21262d;
  --border2:  #30363d;

  --purple:   #7c3aed;
  --purple-l: #a78bfa;
  --purple-xl:#c4b5fd;
  --blue:     #3b82f6;
  --blue-l:   #79c0ff;
  --green:    #3fb950;
  --green-l:  #4ade80;
  --red:      #f85149;
  --red-l:    #fca5a5;
  --orange:   #f0883e;
  --yellow:   #d29922;

  --text:     #e6edf3;
  --text2:    #8b949e;
  --text3:    #484f58;
}

body {
  background: #111;
  display: flex; justify-content: center; align-items: flex-start;
  padding: 16px;
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
}

.poster {
  width: 945px;
  height: 2362px;
  background: var(--bg);
  position: relative; overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.9);
  border-radius: 3px;
  color: var(--text);
  font-size: 14px;
  line-height: 1.55;
}

/* 全局顶部光晕 */
.poster::before {
  content: '';
  position: absolute; top: -500px; left: 50%;
  transform: translateX(-50%);
  width: 3200px; height: 2400px;
  background: radial-gradient(ellipse,
    rgba(124,58,237,0.09) 0%,
    rgba(59,130,246,0.04) 35%,
    transparent 60%);
  pointer-events: none; z-index: 0;
}

.section { position: relative; z-index: 1; }

.divider {
  height: 3px;
  background: linear-gradient(90deg,
    transparent 0%, var(--bg3) 18%, var(--bg3) 82%, transparent 100%);
  position: relative; z-index: 1;
}

.sec-label {
  font-size: 10px; font-weight: 700;
  color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.20em;
  margin-bottom: 20px;
}


/* ══════════════════════════════════
   ① HERO  ·  370px
══════════════════════════════════ */
.hero {
  height: 370px;
  padding: 32px 80px 36px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}

/* 中心光晕 */
.hero-glow {
  position: absolute; top: -30px; left: 50%;
  transform: translateX(-50%);
  width: 760px; height: 360px;
  background: radial-gradient(ellipse,
    rgba(124,58,237,0.28) 0%,
    rgba(59,130,246,0.12) 40%,
    transparent 68%);
  pointer-events: none; z-index: 0;
}

/* 四角装饰框 */
.hero-frame {
  position: absolute;
  top: 80px; bottom: 28px;
  left: 56px; right: 56px;
  pointer-events: none; z-index: 1;
}
.hero-frame::before,
.hero-frame::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
}
.hero-frame::before {
  top: 0; left: 0;
  border-top: 1.5px solid rgba(124,58,237,0.45);
  border-left: 1.5px solid rgba(124,58,237,0.45);
}
.hero-frame::after {
  bottom: 0; right: 0;
  border-bottom: 1.5px solid rgba(59,130,246,0.45);
  border-right: 1.5px solid rgba(59,130,246,0.45);
}

.hero-inner {
  position: relative; z-index: 2;
  width: 100%;
  display: flex; flex-direction: column;
  align-items: center;
}

/* 顶部徽章行 */
.hero-badges {
  display: flex; justify-content: space-between; align-items: center;
  width: 100%; margin-bottom: 30px;
}

.contest-badge {
  background: rgba(59,130,246,0.07);
  border: 1px solid rgba(59,130,246,0.20);
  color: var(--blue-l);
  padding: 6px 18px; border-radius: 4px;
  font-size: 13px; letter-spacing: 0.04em;
}

.finals-badge {
  background: linear-gradient(135deg, #f0883e, #dc6a00);
  color: #fff;
  padding: 6px 18px; border-radius: 4px;
  font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
}

/* 主标题 */
.hero-title {
  font-size: 118px; font-weight: 900;
  letter-spacing: -3px; line-height: 1;
  background: linear-gradient(140deg,
    #ddd6fe  0%,
    #8b5cf6 40%,
    #3b82f6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0;
  filter: drop-shadow(0 0 32px rgba(124,58,237,0.40));
}

/* 装饰分割线 */
.hero-divline {
  width: 220px; height: 1px; margin: 18px 0 18px;
  background: linear-gradient(90deg,
    transparent, rgba(124,58,237,0.5) 30%,
    rgba(59,130,246,0.5) 70%, transparent);
  position: relative;
}
.hero-divline::before {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--purple-l);
  box-shadow: 0 0 8px rgba(139,92,246,0.9);
}

/* 副标题 */
.hero-subtitle {
  font-size: 22px; color: var(--text2);
  letter-spacing: 0.08em; margin-bottom: 26px;
}

/* 功能标签 */
.hero-tags {
  display: flex; gap: 10px; justify-content: center;
}
.hero-tag {
  background: rgba(124,58,237,0.08);
  border: 1px solid rgba(124,58,237,0.22);
  color: var(--purple-l);
  padding: 8px 22px; border-radius: 4px;
  font-size: 14px; font-weight: 500;
  letter-spacing: 0.03em;
}


/* ══════════════════════════════════
   ② 痛点·钩子  ·  252px   [待实现]
══════════════════════════════════ */


/* ══════════════════════════════════
   ③ 解决方案  ·  390px   [待实现]
══════════════════════════════════ */


/* ══════════════════════════════════
   ④ 成效数据  ·  292px   [待实现]
══════════════════════════════════ */


/* ══════════════════════════════════
   ⑤ 真实对话  ·  328px   [待实现]
══════════════════════════════════ */


/* ══════════════════════════════════
   ⑥ 系统输出物  ·  348px   [待实现]
══════════════════════════════════ */


/* ══════════════════════════════════
   ⑦ 社会价值 + Footer  ·  364px   [待实现]
══════════════════════════════════ */

</style>
</head>
<body>
<div class="poster">

  <!-- ① HERO -->
  <div class="hero section">
    <div class="hero-glow"></div>
    <div class="hero-frame"></div>
    <div class="hero-inner">
      <div class="hero-badges">
        <div class="contest-badge">北纬 · 龙虾大赛（第一届）· OpenClaw Hackathon · 生产力赛道</div>
        <div class="finals-badge">🏆 决赛入围</div>
      </div>
      <div class="hero-title">PatientClaw</div>
      <div class="hero-divline"></div>
      <div class="hero-subtitle">患者诊后病情全自动跟踪统计系统</div>
      <div class="hero-tags">
        <span class="hero-tag">🤖 OpenClaw 驱动 · 全自动随访</span>
        <span class="hero-tag">💊 AI 智能解析 · 精准干预</span>
        <span class="hero-tag">📱 飞书推送 · 医生零负担</span>
      </div>
    </div>
  </div>
  <div class="divider"></div>

  <!-- ② 痛点·钩子  [待实现] -->
  <div class="section" style="height:252px; display:flex; align-items:center; justify-content:center;">
    <span style="font-size:12px; color:var(--text3); letter-spacing:0.1em;">② 痛点·钩子 — 待实现</span>
  </div>
  <div class="divider"></div>

  <!-- ③ 解决方案  [待实现] -->
  <div class="section" style="height:390px; background:var(--bg2); display:flex; align-items:center; justify-content:center;">
    <span style="font-size:12px; color:var(--text3); letter-spacing:0.1em;">③ 解决方案 — 待实现</span>
  </div>
  <div class="divider"></div>

  <!-- ④ 成效数据  [待实现] -->
  <div class="section" style="height:292px; display:flex; align-items:center; justify-content:center;">
    <span style="font-size:12px; color:var(--text3); letter-spacing:0.1em;">④ 成效数据 — 待实现</span>
  </div>
  <div class="divider"></div>

  <!-- ⑤ 真实对话  [待实现] -->
  <div class="section" style="height:328px; background:var(--bg2); display:flex; align-items:center; justify-content:center;">
    <span style="font-size:12px; color:var(--text3); letter-spacing:0.1em;">⑤ 真实对话演示 — 待实现</span>
  </div>
  <div class="divider"></div>

  <!-- ⑥ 系统输出物  [待实现] -->
  <div class="section" style="height:348px; display:flex; align-items:center; justify-content:center;">
    <span style="font-size:12px; color:var(--text3); letter-spacing:0.1em;">⑥ 系统输出物（日报 + 患者报告）— 待实现</span>
  </div>
  <div class="divider"></div>

  <!-- ⑦ 社会价值 + Footer  [待实现] -->
  <div class="section" style="height:364px; background:var(--bg2); display:flex; align-items:center; justify-content:center;">
    <span style="font-size:12px; color:var(--text3); letter-spacing:0.1em;">⑦ 社会价值 + Footer — 待实现</span>
  </div>

</div>
</body>
